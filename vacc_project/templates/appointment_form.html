{% extends 'base.html' %}

{% block title %}Appointment - ShishuShield.BD{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-box"></div>
            <h2>Book Appointment</h2>
        </div>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-main" style="width: 100%; padding: 15px;">Save</button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'appointment_list' %}">Back to Appointments</a>
        </div>
    </div>
</div>
{% endblock %}
