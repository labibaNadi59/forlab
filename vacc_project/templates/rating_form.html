{% extends 'base.html' %}

{% block title %}Rate Hospital - ShishuShield.BD{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 550px;">

        <div class="auth-header">
            <div style="width: 90px; height: 90px; border-radius: 50%;
            background: var(--primary-teal); margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-star" style="color: white; font-size: 2.5rem;"></i>
            </div>

            <h2>Rate Hospital</h2>

            <p style="color: #94a3b8;">
                Share your experience and feedback
            </p>
        </div>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
            <div style="margin-bottom: 20px;">

                <label style="display: block; font-weight: 600;
                color: var(--text-dark); margin-bottom: 6px;">

                    <i class="fas fa-star"
                    style="color: var(--primary-teal); margin-right: 6px;"></i>

                    {{ field.label }}
                </label>

                {{ field.errors }}

                {{ field }}
            </div>
            {% endfor %}

            <style>
                form input,
                form select,
                form textarea {
                    width: 100%;
                    padding: 12px 15px;
                    border: 2px solid #e5e7eb;
                    border-radius: 10px;
                    font-size: 1rem;
                    box-sizing: border-box;
                    outline: none;
                    transition: 0.3s ease;
                    font-family: inherit;
                }

                form textarea {
                    resize: vertical;
                    min-height: 120px;
                }

                form input:focus,
                form select:focus,
                form textarea:focus {
                    border-color: var(--primary-teal);
                }
            </style>

            <button type="submit" class="btn-main"
            style="width: 100%; padding: 15px;">
                <i class="fas fa-paper-plane" style="margin-right: 8px;"></i>
                Submit Rating
            </button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'appointment_list' %}">
                <i class="fas fa-arrow-left" style="margin-right: 5px;"></i>
                Back to Appointments
            </a>
        </div>

    </div>
</div>
{% endblock %}
